<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Next-Gen Pharmacy Concept</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.4);
            max-width: 450px;
            width: 100%;
        }

        .login-header {
            background: var(--bs-primary);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .login-body {
            padding: 40px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #dee2e6;
            background-color: #f8f9fa;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: var(--bs-primary);
            background-color: #fff;
        }

        .btn-primary {
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="login-card">
                    <div class="login-header">
                        <h4 class="mb-0 fw-bold">Next-Gen Pharmacy Concept</h4>
                    </div>

                    <div class="login-body">
                        <h5 class="text-center fw-bold mb-4 text-muted">Sign In</h5>

                        {% if form.errors %}
                        <div class="alert alert-danger p-2 fs-7 text-center rounded-3">
                            Your username and password didn't match. Please try again.
                        </div>
                        {% endif %}

                        <form method="post" action="{% url 'login' %}">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label for="id_username" class="form-label text-muted fw-semibold fs-7">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0"><i
                                            class="fa-solid fa-user text-muted"></i></span>
                                    <input type="text" name="username" class="form-control border-start-0"
                                        id="id_username" required autofocus>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="id_password" class="form-label text-muted fw-semibold fs-7">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0"><i
                                            class="fa-solid fa-lock text-muted"></i></span>
                                    <input type="password" name="password" class="form-control border-start-0"
                                        id="id_password" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary mt-2 shadow-sm">
                                <i class="fa-solid fa-arrow-right-to-bracket me-2"></i> Log In
                            </button>

                            <input type="hidden" name="next" value="{{ next|default:'' }}">
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
